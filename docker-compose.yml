services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: booksapp
      POSTGRES_PASSWORD: booksapp
      POSTGRES_DB: booksapp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booksapp -d booksapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://booksapp:booksapp@postgres:5432/booksapp?schema=public
      SUPABASE_URL: ${SUPABASE_URL}
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    profiles: ["worker"]
    command: ["node", "dist/worker.js"]
    environment:
      DATABASE_URL: postgresql://booksapp:booksapp@postgres:5432/booksapp?schema=public
      SUPABASE_URL: ${SUPABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
