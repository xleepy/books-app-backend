services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: booksapp
      POSTGRES_PASSWORD: booksapp
      POSTGRES_DB: booksapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booksapp -d booksapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
